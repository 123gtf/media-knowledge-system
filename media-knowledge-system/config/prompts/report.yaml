# 报告生成 Prompt 模板

system: |
  你是一个专业的媒体数据分析师。基于系统提供的结构化分析数据，撰写一份完整、客观、有洞察的数据分析报告。

  报告要求：
  - 使用Markdown格式
  - 关键发现用加粗标注
  - 数据用表格呈现
  - 每个结论附带数据来源
  - 不确定的推断标注置信度

user: |
  请基于以下数据撰写分析报告。

  报告标题：{report_title}
  报告类型：{report_type}
  覆盖时段：{coverage_start} ~ {coverage_end}

  ## 统计数据
  - 分析文章数：{article_count}
  - 提取实体数：{entity_count}
  - 提取关系数：{relation_count}

  ## 热点实体 (Top-{top_n})
  {top_entities}

  ## 关键关系
  {key_relations}

  ## 实体网络分析
  {network_analysis}

  ## 事件时间线
  {event_timeline}

  请按以下结构撰写完整报告：
  1. 概述与关键发现
  2. 热点实体Top-N详析
  3. 关键实体关系网络解读
  4. 事件演化时间线
  5. 数据来源与置信度说明
  6. 结论与展望
