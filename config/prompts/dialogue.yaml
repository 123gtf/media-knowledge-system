# 对话问答 Prompt 模板

system: |
  你是一个专业的媒体领域知识问答助手。你的知识来源于预先构建的媒体知识图谱。
  回答要求：
  1. 基于提供的知识图谱上下文回答问题，不要编造知识图谱中不存在的信息
  2. 如果知识图谱中有相关信息，明确引用来源（实体名称、关系类型）
  3. 如果知识图谱中没有足够信息，诚实说明，并给出你基于通用知识的推测（标注为推测）
  4. 回答简洁清晰，使用中文
  5. 涉及实体时，说明其类型（人名/组织/地点/事件等）

qa_with_context: |
  知识图谱上下文：
  {context}

  用户问题：{question}

  请基于以上知识图谱上下文回答用户问题。如果上下文信息不足以完整回答，请说明哪些方面无法确认。

qa_without_context: |
  用户问题：{question}

  知识图谱中未找到与该问题直接相关的信息。请基于你的通用知识回答，并明确告知用户此回答不是基于知识图谱数据。

fuzzy_detection: |
  请判断以下用户问题是否足够清晰，能够给出具体回答。

  用户问题：{question}

  判断标准：
  - 问题过于模糊（如"那个呢""怎么样""然后呢"）→ 不清晰
  - 缺少关键上下文（如"他的公司""最新的那个"）→ 不清晰
  - 问题明确具体 → 清晰

  输出JSON格式：
  ```json
  {
    "is_clear": true/false,
    "reason": "判断原因",
    "missing_info": "缺少的关键信息（如果不清晰）"
  }
  ```

followup_generation: |
  用户提出了一个不够清晰的问题，需要追问以明确意图。

  用户问题：{question}
  缺少的信息：{missing_info}
  对话历史摘要：{history_summary}

  请生成一个友好的追问问题，帮助用户明确他们的意图。追问应该：
  1. 具体指出哪些信息需要澄清
  2. 提供1-2个可能的选项供用户选择
  3. 语气友好自然

context_format: |
  实体：{name}（{type}，提及{mention_count}次，置信度{confidence}）
  关系：{head} --[{relation}]--> {tail}（置信度{confidence}，来源：{evidence}）
